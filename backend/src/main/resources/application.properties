server.port=8082
spring.config.import=optional:file:./.env[.properties]

# ======================
# DATABASE
# ======================
spring.datasource.url=${DB_URL:jdbc:h2:mem:smartcampus-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.data.mongodb.uri=${MONGODB_URI:${MONGO_URI:mongodb://localhost:27017}}
spring.data.mongodb.database=${MONGODB_DATABASE:smart_campus}

# ======================
# GOOGLE OAUTH (SECURE)
# ======================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ======================
# EMAIL CONFIG (SECURE)
# ======================
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ======================
# FILE UPLOAD
# ======================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

file.upload-dir=uploads/tickets