server.port=8082
spring.config.import=file:./.env[.properties]

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_campus}
spring.data.mongodb.database=${MONGODB_DATABASE:smart_campus}

# Google OAuth2 credentials (from Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio (WhatsApp notifications) — set real values in .env to enable
twilio.account-sid=${TWILIO_ACCOUNT_SID:ACplaceholder}
twilio.auth-token=${TWILIO_AUTH_TOKEN:placeholder}

# Jackson — serialize LocalDateTime as ISO-8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# Seeder Passwords
app.seed.admin.password=${ADMIN_PASSWORD:SuperAdmin123}
app.seed.technician.password=${TECHNICIAN_PASSWORD:Tech123}